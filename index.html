<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlushRP-EMS - System Rozliczeniowy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00d4ff;
            --dark-blue: #0a192f;
            --success-green: #00ff88;
            --text-light: #e6f1ff;
            --card-bg: rgba(16, 33, 65, 0.9);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #020c1b 0%, #0a192f 100%);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            position: relative;
        }

        .logo-container { position: absolute; top: 25px; right: 25px; text-align: right; }
        .logo-img { max-width: 100px; height: auto; border-radius: 8px; display: block; border: 1px solid var(--primary-blue); }

        header { text-align: center; margin-bottom: 40px; padding-top: 10px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary-blue); font-size: 3rem; margin: 0; text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }

        .section-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-header {
            background: rgba(0, 212, 255, 0.15);
            padding: 12px 20px;
            font-weight: bold;
            border-left: 5px solid var(--primary-blue);
            margin: -20px -20px 15px -20px;
            font-family: 'Orbitron';
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { font-size: 0.75rem; color: var(--primary-blue); text-transform: uppercase; }

        input[type="number"], .data-input {
            background: #010813;
            border: 1px solid var(--primary-blue);
            color: white;
            padding: 6px;
            border-radius: 4px;
            outline: none;
        }

        .admin-panel { display: none; border: 2px dashed var(--primary-blue); padding: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.8); }
        .modifier-btn {
            padding: 8px 15px;
            border: 1px solid var(--primary-blue);
            background: transparent;
            color: var(--primary-blue);
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            border-radius: 4px;
            transition: 0.3s;
        }
        .modifier-btn.active { background: var(--primary-blue); color: #020c1b; }

        .billing-summary {
            position: sticky; bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #0056b3);
            color: #020c1b; padding: 20px 30px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 30px; box-shadow: 0 10px 40px rgba(0, 212, 255, 0.5);
            z-index: 100;
        }

        .btn-action {
            background: #020c1b; color: var(--primary-blue);
            border: none; padding: 15px 30px; border-radius: 8px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 0.7rem; color: gray; cursor: pointer;" onclick="toggleAdmin()">⚙️ PANEL ADMINA</div>
    
    <div id="admin-section" class="admin-panel">
        <h3 style="font-family: 'Orbitron'; color: var(--primary-blue);">ZARZĄDZANIE CENAMI</h3>
        <div id="admin-prices-list"></div>
        <button class="modifier-btn" style="margin-top:10px" onclick="saveAdminPrices()">ZAPISZ NOWY CENNIK</button>
    </div>

    <div class="logo-container">
        <img src="obraz_2026-05-02_212208153.png" alt="FlushRP Logo" class="logo-img">
    </div>

    <header>
        <h1>FLUSHRP-EMS</h1>
        <div style="font-size:0.85rem; margin-top:5px; color: var(--primary-blue);">CENTRAL BILLING SYSTEM | RIVER CITY</div>
    </header>

    <div class="section-card">
        <div class="section-header">INFORMACJE I MODYFIKATORY</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">
            <input type="text" id="patient-name" class="data-input" placeholder="Pacjent...">
            <input type="text" id="ems-name" class="data-input" placeholder="Ratownik...">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="modifier-btn" id="mod-09" onclick="setModifier(0.9)">ZNIŻKA -10%</button>
            <button class="modifier-btn active" id="mod-10" onclick="setModifier(1.0)">STANDARD</button>
            <button class="modifier-btn" id="mod-11" onclick="setModifier(1.1)">WZROST +10%</button>
        </div>
    </div>
    <div class="section-card">
        <div class="section-header">TRANSPORT I USŁUGI BAZOWE</div>
        <table id="table-transport">
            <thead><tr><th>Usługa</th><th>Stawka</th><th>Wybór/Ilość</th></tr></thead>
            <tbody id="body-transport"></tbody>
        </table>
    </div>

    <div class="section-card">
        <div class="section-header">PROCEDURY I DIAGNOSTYKA</div>
        <table id="table-procedury">
            <thead><tr><th>Zabieg</th><th>Stawka</th><th>Wybór</th></tr></thead>
            <tbody id="body-procedury"></tbody>
        </table>
    </div>

    <div class="section-card">
        <div class="section-header">OPATRUNKI I LEKI</div>
        <table id="table-med">
            <thead><tr><th>Nazwa</th><th>Stawka</th><th>Ilość</th></tr></thead>
            <tbody id="body-med"></tbody>
        </table>
    </div>

    <div class="billing-summary">
        <h2 style="margin:0; font-family: 'Orbitron';">SUMA: <span id="total-amount">$0.00</span></h2>
        <button class="btn-action" onclick="generateInvoice()">GENERUJ RACHUNEK</button>
    </div>

    <footer>RIVER CITY EMS BILLING SYSTEM // FLUSHRP 2026</footer>
</div>
<script>
    // Baza danych usług
    const defaultServices = [
        { cat: 'transport', name: "Transport BLS", price: 585, type: 'check' },
        { cat: 'transport', name: "Transport ALS", price: 950, type: 'check' },
        { cat: 'transport', name: "Transport Specjalny", price: 1200, type: 'check' },
        { cat: 'transport', name: "Przebieg (Mile)", price: 25, type: 'qty' },
        { cat: 'proc', name: "EKG Pełne", price: 135, type: 'check' },
        { cat: 'proc', name: "Intubacja", price: 450, type: 'check' },
        { cat: 'proc', name: "Dostęp IV", price: 110, type: 'check' },
        { cat: 'proc', name: "Pomiar Glikemii", price: 45, type: 'check' },
        { cat: 'med', name: "Zestaw Opatrunkowy", price: 85, type: 'qty' },
        { cat: 'med', name: "Adrenalina", price: 110, type: 'qty' },
        { cat: 'med', name: "Narcan", price: 140, type: 'qty' },
        { cat: 'med', name: "Leki Przeciwbólowe", price: 120, type: 'qty' }
    ];

    let services = JSON.parse(localStorage.getItem('ems_prices')) || defaultServices;
    let activeModifier = 1.0;

    function renderTables() {
        const bodies = { transport: 'body-transport', proc: 'body-procedury', med: 'body-med' };
        Object.values(bodies).forEach(id => document.getElementById(id).innerHTML = '');
        
        const adminList = document.getElementById('admin-prices-list');
        adminList.innerHTML = '';

        services.forEach((s, idx) => {
            const input = s.type === 'check' 
                ? `<input type="checkbox" class="calc-input" data-idx="${idx}">`
                : `<input type="number" class="calc-input calc-qty" data-idx="${idx}" value="0" min="0">`;
            
            document.getElementById(bodies[s.cat]).innerHTML += `
                <tr><td>${s.name}</td><td>$${s.price}</td><td>${input}</td></tr>`;
            
            adminList.innerHTML += `<div style="margin-bottom:5px">${s.name}: <input type="number" class="admin-val" data-idx="${idx}" value="${s.price}"></div>`;
        });
    }

    function setModifier(val) {
        activeModifier = val;
        document.querySelectorAll('.modifier-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + val.toString().replace('.','')).classList.add('active');
    }

    function toggleAdmin() {
        if(prompt("Hasło:") === "admin123") {
            const el = document.getElementById('admin-section');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }
    }

    function saveAdminPrices() {
        document.querySelectorAll('.admin-val').forEach(i => {
            services[i.dataset.idx].price = parseFloat(i.value);
        });
        localStorage.setItem('ems_prices', JSON.stringify(services));
        renderTables();
        alert("Zapisano!");
    }

    function generateInvoice() {
        let total = 0; let items = [];
        document.querySelectorAll('.calc-input').forEach(i => {
            let val = i.type === 'checkbox' ? (i.checked ? 1 : 0) : (parseInt(i.value) || 0);
            if(val > 0) {
                let s = services[i.dataset.idx];
                let finalPrice = val * s.price * activeModifier;
                total += finalPrice;
                items.push({name: s.name, price: finalPrice.toFixed(2), qty: val});
            }
        });

        localStorage.setItem('lastInvoice', JSON.stringify({
            patient: document.getElementById('patient-name').value || "NIEZNANY",
            ems: document.getElementById('ems-name').value || "RATOWNIK",
            total: total.toFixed(2), items: items, date: new Date().toLocaleString()
        }));
        window.location.href = 'rachunek.html';
    }

    setInterval(() => {
        let t = 0;
        document.querySelectorAll('.calc-input').forEach(i => {
            let val = i.type === 'checkbox' ? (i.checked ? 1 : 0) : (parseInt(i.value) || 0);
            t += val * services[i.dataset.idx].price;
        });
        document.getElementById('total-amount').innerText = '$' + (t * activeModifier).toLocaleString('en-US', {minimumFractionDigits: 2});
    }, 400);

    renderTables();
</script>
</body>
</html>
