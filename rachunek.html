<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rachunek FlushRP-EMS</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; padding: 30px; background: #0a192f; color: white; }
        
        .nav-buttons {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            gap: 10px;
        }

        .invoice-box { 
            background: white; 
            padding: 40px; 
            max-width: 800px; 
            margin: auto; 
            color: black;
            border: 1px solid #eee; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .header { display: flex; justify-content: space-between; border-bottom: 2px solid black; padding-bottom: 20px; margin-bottom: 20px; }
        .logo { max-width: 100px; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        
        .total { text-align: right; font-size: 1.5rem; font-weight: bold; margin-top: 20px; }

        .btn { 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        .btn-back { background: #444; color: white; }
        .btn-print { background: #00d4ff; color: #020c1b; }
        .btn-copy { background: #00ff88; color: #020c1b; }
        
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        @media print { 
            .nav-buttons { display: none; } 
            body { background: white; padding: 0; } 
            .invoice-box { box-shadow: none; border: none; width: 100%; } 
        }
    </style>
</head>
<body>

<div class="nav-buttons">
    <a href="index.html" class="btn btn-back">⬅ POWRÓT</a>
    <button class="btn btn-print" onclick="window.print()">ZAPISZ JAKO PDF</button>
    <button class="btn btn-copy" onclick="copyInvoice()">SKOPIUJ TEKST</button>
</div>

<div class="invoice-box" id="invoice">
    <div class="header">
        <div>
            <h1 style="margin:0;">FLUSHRP MEDICAL SERVICES</h1>
            <p style="margin:5px 0;">DOKUMENTACJA MEDYCZNA NR: #<span id="inv-id"></span></p>
            <p id="inv-date" style="margin:0; font-size: 0.9rem;"></p>
        </div>
        <img src="obraz_2026-05-02_212208153.png" class="logo">
    </div>

    <p><strong>PACJENT:</strong> <span id="inv-patient"></span></p>

    <table>
        <thead>
            <tr><th>USŁUGA / LEK</th><th>ILOŚĆ</th><th>KOSZT</th></tr>
        </thead>
        <tbody id="inv-items"></tbody>
    </table>

    <div class="total">SUMA: $<span id="inv-total"></span></div>
    
    <div style="margin-top: 50px; font-size: 0.8rem; border-top: 1px dashed black; padding-top: 10px;">
        STATUS: OPŁACONO SYSTEMOWO<br>
        WYSTAWIŁ: SYSTEM FLUSHRP-EMS<br>
        <em>Author: Prywatny Andrzej Duda</em>
    </div>
</div>

<script>
    const data = JSON.parse(localStorage.getItem('lastInvoice'));
    if(data) {
        document.getElementById('inv-patient').innerText = data.patient;
        document.getElementById('inv-total').innerText = data.total;
        document.getElementById('inv-date').innerText = "Data wystawienia: " + data.date;
        document.getElementById('inv-id').innerText = Math.floor(Math.random() * 90000) + 10000;
        
        const tbody = document.getElementById('inv-items');
        data.items.forEach(item => {
            tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>$${item.price}</td></tr>`;
        });
    }

    function copyInvoice() {
        const patient = document.getElementById('inv-patient').innerText;
        const total = document.getElementById('inv-total').innerText;
        const text = `--- RACHUNEK FLUSHRP-EMS ---\\nPacjent: ${patient}\\nSuma: $${total}\\nStatus: Zrealizowano`;
        navigator.clipboard.writeText(text);
        alert("Skopiowano podstawowe dane do schowka!");
    }
</script>

</body>
</html>
